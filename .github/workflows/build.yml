name: Build All Daisy Firmware

on:
  push:
    branches: [main]
    paths:
      - 'projects.json'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
  schedule:
    # Rebuild monthly to catch upstream updates
    - cron: '0 6 1 * *'

env:
  LIBDAISY_VERSION: v7.0.1
  DAISYSP_VERSION: v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi jq

      - name: Cache libDaisy and DaisySP
        uses: actions/cache@v4
        with:
          path: |
            sources/libDaisy
            sources/DaisySP
          key: daisy-libs-${{ env.LIBDAISY_VERSION }}-${{ env.DAISYSP_VERSION }}

      - name: Setup libDaisy
        run: |
          if [ ! -d sources/libDaisy ]; then
            git clone https://github.com/electro-smith/libDaisy.git sources/libDaisy
          fi
          cd sources/libDaisy
          git fetch --tags
          git checkout "$LIBDAISY_VERSION" 2>/dev/null || git checkout "tags/${LIBDAISY_VERSION}"
          make -j$(nproc) || true

      - name: Setup DaisySP
        run: |
          if [ ! -d sources/DaisySP ]; then
            git clone https://github.com/electro-smith/DaisySP.git sources/DaisySP
          fi
          cd sources/DaisySP
          git fetch --tags
          git checkout "$DAISYSP_VERSION" 2>/dev/null || git checkout "tags/${DAISYSP_VERSION}"
          make -j$(nproc) || true

      - name: Build all projects
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/build_all.sh
          scripts/build_all.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daisy-firmware-bins
          path: output/*.bin
          retention-days: 90

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_logs/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: daisy-firmware-bins
          path: bins/

      - name: Count binaries
        id: count
        run: |
          BIN_COUNT=$(ls bins/*.bin 2>/dev/null | wc -l)
          echo "count=${BIN_COUNT}" >> "$GITHUB_OUTPUT"
          echo "Found ${BIN_COUNT} firmware binaries"

      - name: Create Release
        if: steps.count.outputs.count > 0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Firmware Build #${{ github.run_number }}"
          body: |
            Automated firmware build from projects.json.

            **libDaisy**: ${{ env.LIBDAISY_VERSION }}
            **DaisySP**: ${{ env.DAISYSP_VERSION }}
            **Binaries**: ${{ steps.count.outputs.count }}

            Flash any `.bin` file using the [Daisy Web Programmer](https://electro-smith.github.io/Programmer/).
          files: bins/*.bin
          draft: false
          prerelease: false
